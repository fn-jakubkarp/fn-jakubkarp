name: Metrics
on:
  schedule: [{cron: "0 10,22 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: fn-jakubkarp
          template: classic
          base: header, activity, metadata
          config_timezone: Europe/Warsaw
